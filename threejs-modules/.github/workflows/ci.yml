# ─── GitHub Actions CI — Module Library Quality Gate ─────────────────────────
#
# VAI TRÒ:
#   Đảm bảo mọi module commit vào library đều pass type-check, lint, format.
#   Module xấu ở đây → lan vào project khi Gemini drop vào src/imported/ → lỗi muộn.
#   CI chặn từ nguồn.
#
# KHÁC VỚI PROJECT CI:
#   Không có bước Build (library là source-only, không compile).
#   Không có bước Test (module test bằng cách integrate vào project thật).
#
# KÍCH HOẠT:
#   - Mọi push lên bất kỳ branch nào
#   - Mọi Pull Request nhắm vào main / master
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - master

jobs:
  quality:
    name: Module Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # npm ci: cài đúng phiên bản trong lock file, môi trường sạch
      - name: Install dependencies
        run: npm ci

      # Kiểm tra type toàn bộ modules — bắt lỗi mà editor đôi khi bỏ qua
      - name: TypeScript check
        run: npm run type-check

      # Enforce: no-any, no-non-null-assertion, Rule 50, import sort
      - name: Lint
        run: npm run lint

      # Module phải cùng code style với project để paste vào không cần reformat
      - name: Format check
        run: npm run format:check
