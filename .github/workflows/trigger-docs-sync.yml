name: Trigger Docs Sync

on:
  push:
    branches: [main]
    paths:
      - 'threejs-modules/**'
      - 'ROADMAP.md'
      - 'ARCHITECTURE.md'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch sync-docs to web3d-docs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DOCS_SYNC_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'NgQuan86',
              repo: 'web3d-docs',
              event_type: 'sync-docs',
            })
            console.log('Dispatched sync-docs to NgQuan86/web3d-docs')
